services:
  postgres:
    image: postgres:17
    container_name: resistance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resistance
    ports:
      - "5433:5432"
    volumes:
      - resistance-postgres-data:/var/lib/postgresql/data

volumes:
  resistance-postgres-data:
